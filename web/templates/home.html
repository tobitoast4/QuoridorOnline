{% extends "layouts/layout.html" %}
{% block body %}
{% load static %}
<script src="{% static 'js/query_server.js' %}"></script>
<script>
    server_url = "{{ request.scheme }}://{{ request.get_host }}/";
</script>
<div>
    <br/>
    <div style="width: 100%; text-align: right;">
        {% if user.is_authenticated and not user.is_guest %}
            {% if user.is_superuser %}
                <a href="/dashboard">
                    <button title="Dashboard" class="inline-button" style="margin-right: 0.5rem;">
                        <i class="fa fa-tachometer" aria-hidden="true"></i>
                    </button>
                </a>
            {% endif %}
            <a href="{% url 'account' %}">
                <button title="Account" class="inline-button" style="margin-right: 0.5rem;">
                    <i class="fa fa-user" aria-hidden="true"></i>
                </button>
            </a>
            <a href="{% url 'logout' %}">
                <button title="Logout" class="inline-button" style="margin-right: 1rem;">
                    <i class="fa fa-sign-out" aria-hidden="true"></i>
                </button>
            </a>
        {% else %}
            <a href="{% url 'login' %}">
                <button title="Login" class="inline-button" style="margin-right: 1rem;">
                    <i class="fa fa-sign-in" aria-hidden="true"></i>
                </button>
            </a>
        {% endif %}
    </div>
    <br/>
    <br/>
    <br/>
    <h1 class="font-effect-outline font-moul-white-big">QuoridorOnline</h1>
    <br/>
    <br/>
    <div class="text-box">
        <a href="/lobby" class="btn btn-white btn-animate">new lobby</a>
    </div>
    <br/>
    <div class="text-box">
        <a href="#" onclick="getRandomPublicLobby()" class="btn btn-white btn-animate">Join random</a>
    </div>
    <br/>
    <br/>
    <div class="text-box">
        <a href="/local?amount_players=2" class="btn btn-white btn-animate">Play on this PC</a>
    </div>
    <br/>
    <div class="text-box">
        <a href="/how-to-play" class="btn btn-white btn-animate">How to play</a>
    </div>
    <br/>
    <div class="text-box">
        <a href="/about" class="btn btn-white btn-animate">About</a>
    </div>

    <div style="position: absolute; bottom: 16px; left: 16px; font-size: 12px">
        <a href="/privacy_policy">Privacy Policy</a>
    </div>
</div>

<!--this is the animated background-->
<div style="text-align: left; margin: 0; position: fixed; top: 0px; left: 0px; z-index: -1;">
    <canvas style=""></canvas>
    <script src="{% static 'js/background_canvas.js' %}"></script>
</div>
